<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم ورود</title>
    <link rel="stylesheet" href="singIn.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>ورود به حساب کاربری</h2>
                <p>اطلاعات خود را وارد کنید تا به حساب کاربریتان دسترسی پیدا کنید</p>
            </div>
            
            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required autocomplete="email">
                        <label for="email">آدرس ایمیل</label>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <label for="password">رمز عبور</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="نمایش یا پنهان کردن رمز عبور">
                            <span class="eye-icon"></span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="remember-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-label">
                            <span class="checkmark"></span>
                            مرا به خاطر بسپار
                        </span>
                    </label>
                    <a href="#" class="forgot-password">رمز عبور خود را فراموش کرده‌اید؟</a>
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-text">ورود</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="signup-link">
                <p>حساب کاربری ندارید؟ <a href="#">ایجاد حساب</a></p>
            </div>

            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <h3>ورود با موفقیت انجام شد!</h3>
                <p>در حال انتقال به داشبورد...</p>
            </div>
        </div>
    </div>
</body>
</html>
