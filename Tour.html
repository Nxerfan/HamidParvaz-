<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <div class="containerPart1">
        <div class="containerPart2">
            <section class="offers">
                <div class="top">
                    <h4>تورهای پیشنهادی ما</h4>
                </div>
                <div class="bottomHotel">
                    <div class="MediaScrollerHotel">
                        
                        <div class="MediaElementHotel TourCardSpecial">
                            <div class="TourRibbon">ویژه نوروز</div>
                            <img src="https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?q=80&w=500&auto=format&fit=crop" alt="Tour">
                            <div class="TourInfoBox">
                                <h3 class="TourName">تور ترکیبی ایتالیا (رم + میلان)</h3>
                                <div class="TourSpecs">
                                    <span><i class="fa-regular fa-clock"></i> ۷ شب و ۸ روز</span>
                                    <span><i class="fa-solid fa-plane-up"></i> پرواز مستقیم</span>
                                </div>
                                <div class="TourServices">
                                    <span>صبحانه</span>
                                    <span>لیدر فارسی زبان</span>
                                    <span>بیمه</span>
                                </div>
                                <div class="price">
                                    <div class="titel"><p>شروع قیمت از</p></div>
                                    <div class="price">
                                        <p><span>۴۸,۹۰۰,۰۰۰</span> تومان</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
