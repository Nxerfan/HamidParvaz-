<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="sidebarFilters">
  <div class="filterHeader">
    <span>فیلترها</span>
  </div>
  
  <div class="filterContentArea">
    <span class="resultsCount">نمایش ۵۰ از ۵۰ نتیجه</span>
    
    <div class="filterDropdown">
      <div class="dropdownTrigger" id="filterBtn">
        <span>قیمت</span>
        <i class="fa-solid fa-angle-down"></i>
      </div>
      
      <div class="dropdownPanel" id="filterContent">
        <div class="priceSliderBox">
          
          <div class="priceLabels">
            <div class="labelGroup">
              <span>از</span>
              <span class="displayMin">۰</span>
              <span>تومان</span>
            </div>
            <span class="labelSeparator">-</span>
            <div class="labelGroup">
              <span>تا</span>
              <span class="displayMax">۱,۰۰۰,۰۰۰</span>
              <span>تومان</span>
            </div>
          </div>
          
          <div class="rangeSliderContainer">
            <div class="sliderTrack"></div>
            <div class="sliderProgress"></div>
            <div class="rangeInputs">
              <input type="range" class="rangeMin" min="0" max="1000000" value="0" step="1000">
              <input type="range" class="rangeMax" min="0" max="1000000" value="1000000" step="1000">
            </div>
          </div>
          
        </div>
      </div>
    </div>
  </div>
</div>
<script src="main.js"></script>
</body>
</html>
